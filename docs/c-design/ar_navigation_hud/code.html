<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>AR Navigation HUD</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Theme Configuration -->
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#ff382e',
              'background-light': '#f8f5f5',
              'background-dark': '#23100f',
              'glass-dark': 'rgba(20, 10, 10, 0.65)',
              'glass-border': 'rgba(255, 255, 255, 0.1)',
            },
            fontFamily: {
              display: ['Lexend', 'sans-serif'],
            },
            borderRadius: {
              DEFAULT: '0.375rem',
              lg: '0.5rem',
              xl: '0.75rem',
              full: '9999px',
            },
          },
        },
      };
    </script>
    <style>
      /* Custom Styles for AR Overlay effects */
      .ar-overlay-gradient {
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.8) 0%,
          rgba(0, 0, 0, 0) 40%,
          rgba(0, 0, 0, 0.4) 100%
        );
      }

      .glass-card {
        background: rgba(35, 16, 15, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }

      .text-shadow-sm {
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      }

      /* Simulated AR Arrow Perspective */
      .perspective-container {
        perspective: 800px;
      }

      .ar-arrow {
        transform: rotateX(60deg) scale(1.5);
        opacity: 0.9;
      }

      .ar-path {
        mask-image: linear-gradient(to top, black 40%, transparent 100%);
        -webkit-mask-image: linear-gradient(to top, black 40%, transparent 100%);
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="font-display bg-background-light dark:bg-background-dark text-white h-screen w-full overflow-hidden"
  >
    <!-- Main Container -->
    <div class="relative h-full w-full flex flex-col">
      <!-- Background Camera Feed Simulation -->
      <div class="absolute inset-0 z-0">
        <img
          alt="Race track grandstand view with crowd"
          class="w-full h-full object-cover"
          data-alt="Race track grandstand view with crowd"
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuDegUTbxV-iyxMEpwHB1yj7VQ4hQ4Ysb6Omd0I8zW2CeHl9z4tHk7MNImi1HHMmRmJ0ghxqxFKeajwLQL4Gp9vy6frvEoYlkyYVXCU3QxeMQFXP_3pOMoAwnxY4n5_Q2e5eBGjVsIYFZc6xk5ojHqhuo03r-36xXS4wteKbngsoG6JW-tv3kvZ5jPXVUi_hoHjH3T_7is5_3tMC9f-CE8NCGHuydOxoiAMAOQHwdcgz-TlKO2JOPaUPT-wB7qQ6pdDX8TmNjUKrQPs3"
        />
        <!-- Overlay Gradient for Readability -->
        <div class="absolute inset-0 ar-overlay-gradient pointer-events-none"></div>
      </div>
      <!-- AR World Space Elements (Simulated) -->
      <div
        class="absolute inset-0 z-10 pointer-events-none perspective-container flex flex-col items-center justify-end pb-32"
      >
        <!-- Simulated 3D Arrows on the ground -->
        <div class="flex flex-col items-center space-y-[-20px] ar-path opacity-80">
          <div class="ar-arrow text-primary animate-pulse duration-1000">
            <span
              class="material-symbols-outlined text-[120px] font-bold"
              style="
                font-variation-settings:
                  'FILL' 1,
                  'wght' 700;
              "
              >keyboard_arrow_up</span
            >
          </div>
          <div class="ar-arrow text-primary/60">
            <span
              class="material-symbols-outlined text-[100px] font-bold"
              style="
                font-variation-settings:
                  'FILL' 1,
                  'wght' 700;
              "
              >keyboard_arrow_up</span
            >
          </div>
          <div class="ar-arrow text-primary/30">
            <span
              class="material-symbols-outlined text-[80px] font-bold"
              style="
                font-variation-settings:
                  'FILL' 1,
                  'wght' 700;
              "
              >keyboard_arrow_up</span
            >
          </div>
        </div>
      </div>
      <!-- Floating POI Markers (Simulated 3D Placement) -->
      <!-- Grandstand B Marker -->
      <div class="absolute top-[35%] left-[20%] z-20 transform -translate-x-1/2">
        <div class="glass-card px-4 py-2 rounded-lg flex items-center gap-3">
          <div class="bg-primary rounded-full p-1.5 flex items-center justify-center">
            <span class="material-symbols-outlined text-white text-sm">stadium</span>
          </div>
          <div class="flex flex-col">
            <span class="text-sm font-bold leading-tight">Grandstand B</span>
            <span class="text-xs text-gray-300 font-medium">250m • Ahead</span>
          </div>
        </div>
        <!-- Pin stem -->
        <div class="w-0.5 h-16 bg-gradient-to-b from-white to-transparent mx-auto mt-[-1px]"></div>
        <div class="w-3 h-3 bg-white rounded-full mx-auto mt-[-2px] blur-[2px]"></div>
      </div>
      <!-- Main Paddock Marker (Further away) -->
      <div
        class="absolute top-[42%] right-[15%] z-10 transform translate-x-1/2 opacity-80 scale-90"
      >
        <div
          class="glass-card px-3 py-1.5 rounded-lg flex items-center gap-2 border-white/5 bg-black/60"
        >
          <div class="bg-white/10 rounded-full p-1 flex items-center justify-center">
            <span class="material-symbols-outlined text-white text-xs">sports_motorsports</span>
          </div>
          <div class="flex flex-col">
            <span class="text-xs font-bold leading-tight">Main Paddock</span>
            <span class="text-[10px] text-gray-300">450m</span>
          </div>
        </div>
        <div
          class="w-0.5 h-10 bg-gradient-to-b from-white/50 to-transparent mx-auto mt-[-1px]"
        ></div>
      </div>
      <!-- UI HUD Layer -->
      <div class="relative z-30 flex flex-col h-full justify-between pointer-events-none">
        <!-- Top Header -->
        <div class="pt-12 px-4 pointer-events-auto">
          <div class="glass-card rounded-xl p-4 flex items-center justify-between shadow-lg">
            <button
              class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-white/10 transition-colors text-white"
            >
              <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <div class="flex flex-col items-center flex-1 mx-2">
              <h2
                class="text-base font-bold tracking-wide uppercase text-primary/90 text-sm mb-0.5"
              >
                Navigating To
              </h2>
              <div class="flex items-center gap-1">
                <span class="text-lg font-bold">Grandstand B</span>
                <span class="text-xs bg-white/10 px-2 py-0.5 rounded text-gray-200">3 min</span>
              </div>
            </div>
            <button
              class="flex items-center justify-center w-10 h-10 rounded-full bg-red-900/40 text-red-200 border border-red-500/30 hover:bg-red-900/60 transition-colors"
            >
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
        </div>
        <!-- Warning/Alert Toast (Optional context) -->
        <div class="w-full flex justify-center mt-4">
          <div
            class="glass-card rounded-full px-4 py-1 flex items-center gap-2 border-l-4 border-l-yellow-500"
          >
            <span class="material-symbols-outlined text-yellow-500 text-sm">warning</span>
            <span class="text-xs font-medium">Crowd heavy near Gate 4</span>
          </div>
        </div>
        <!-- Bottom Controls -->
        <div class="mt-auto px-4 pb-8 pointer-events-auto w-full">
          <div class="flex flex-col gap-4">
            <!-- Bottom Info Card -->
            <div class="glass-card rounded-xl p-4 flex items-center gap-4">
              <div
                class="relative w-16 h-16 rounded-lg overflow-hidden shrink-0 border border-white/10"
              >
                <img
                  alt="Overhead view of a racing track curve"
                  class="w-full h-full object-cover opacity-80"
                  data-location="Monaco"
                  src="https://lh3.googleusercontent.com/aida-public/AB6AXuD6ot59ltVeZUgEuc30LHWTCPg56VE7sH2jeFlFpKE7u4sB5tRosjtro7QehWaBPwCu89fvzY6Lm4xV2h31kadyLgTn20xBZ6twkxpFgLvuU4kl7Kg551QmVxk7flyoC3MWHgNkjPL85Q8gacvxFgTjMhrEjPHxzX54rxFUqNcQkx2CYATE2pFqMV-jHK5hKsmZHdUdhHtMFaMX__2ZRuLERNwxPjmWtcnVX2oUKf--WmzCocWOJ4wM9EMY98811KfWi6rHVXKrJW9D"
                />
                <div class="absolute inset-0 flex items-center justify-center bg-black/30">
                  <span class="material-symbols-outlined text-white/90">360</span>
                </div>
              </div>
              <div class="flex-1 flex flex-col justify-center">
                <div class="flex items-baseline gap-2">
                  <span class="text-3xl font-bold tracking-tighter">250</span>
                  <span class="text-sm font-medium text-gray-400">meters</span>
                </div>
                <p class="text-sm text-gray-300">Continue straight past the merch stand</p>
              </div>
              <div
                class="h-12 w-12 rounded-full border-2 border-primary/50 flex items-center justify-center relative"
              >
                <!-- Compass North Indicator -->
                <div class="absolute top-0 w-1 h-2 bg-primary"></div>
                <span class="material-symbols-outlined text-primary text-xl rotate-45 transform"
                  >navigation</span
                >
              </div>
            </div>
            <!-- Action Bar -->
            <div class="flex items-center gap-3">
              <button
                class="flex-1 h-14 bg-primary hover:bg-red-600 text-white rounded-xl font-bold text-base tracking-wide shadow-lg shadow-red-900/20 flex items-center justify-center gap-2 transition-all active:scale-[0.98]"
              >
                <span class="material-symbols-outlined">map</span>
                Switch to 2D Map
              </button>
              <button
                class="h-14 w-14 glass-card rounded-xl flex items-center justify-center hover:bg-white/10 transition-colors text-white"
              >
                <span class="material-symbols-outlined">center_focus_weak</span>
              </button>
            </div>
          </div>
        </div>
      </div>
      <!-- Vignette Effect for immersion -->
      <div
        class="absolute inset-0 pointer-events-none shadow-[inset_0_0_100px_rgba(0,0,0,0.6)] z-20"
      ></div>
    </div>
  </body>
</html>
