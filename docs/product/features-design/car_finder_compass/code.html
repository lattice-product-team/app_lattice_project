<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Car Finder Compass</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#ff382e',
              'background-light': '#f8f5f5',
              'background-dark': '#0A0A0B', // Modified to match user request for deep dark
              'surface-dark': '#18181b',
              'grid-line': '#27272a',
            },
            fontFamily: {
              display: ['Lexend', 'sans-serif'],
              body: ['Lexend', 'sans-serif'],
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '0.5rem',
              xl: '0.75rem',
              '2xl': '1rem',
              full: '9999px',
            },
            backgroundImage: {
              'grid-pattern':
                'linear-gradient(to right, #27272a 1px, transparent 1px), linear-gradient(to bottom, #27272a 1px, transparent 1px)',
            },
          },
        },
      };
    </script>
    <style>
      /* Custom Styles for Compass and Animations */
      body {
        font-family: 'Lexend', sans-serif;
      }

      .compass-container {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .pulse-ring {
        position: absolute;
        border-radius: 50%;
        border: 2px solid rgba(255, 56, 46, 0.3);
        box-shadow: 0 0 15px rgba(255, 56, 46, 0.2);
        animation: pulse-out 2s infinite ease-out;
      }

      .pulse-ring:nth-child(1) {
        width: 100%;
        height: 100%;
        animation-delay: 0s;
      }
      .pulse-ring:nth-child(2) {
        width: 85%;
        height: 85%;
        animation-delay: 0.5s;
      }
      .pulse-ring:nth-child(3) {
        width: 70%;
        height: 70%;
        animation-delay: 1s;
      }

      @keyframes pulse-out {
        0% {
          transform: scale(0.9);
          opacity: 0.8;
        }
        100% {
          transform: scale(1.4);
          opacity: 0;
        }
      }

      .glass-panel {
        background: rgba(24, 24, 27, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .grid-bg {
        background-size: 40px 40px;
        mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
        -webkit-mask-image: linear-gradient(
          to bottom,
          transparent,
          black 10%,
          black 90%,
          transparent
        );
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white min-h-screen flex flex-col relative overflow-hidden selection:bg-primary selection:text-white"
  >
    <!-- Background Grid -->
    <div
      class="absolute inset-0 bg-grid-pattern opacity-[0.15] grid-bg pointer-events-none z-0"
    ></div>
    <!-- Header -->
    <header class="relative z-10 flex items-center justify-between p-6 pt-8 pb-2">
      <div class="flex flex-col">
        <h2 class="text-xs uppercase tracking-widest text-primary font-bold mb-1">Target Locked</h2>
        <h1 class="text-xl font-bold leading-tight text-white/90">
          Sector 4 <span class="font-normal text-white/50">| Row C</span>
        </h1>
      </div>
      <button
        class="glass-panel h-10 w-10 flex items-center justify-center rounded-full text-white hover:bg-white/10 transition-colors"
      >
        <span class="material-symbols-outlined text-[20px]">view_in_ar</span>
      </button>
    </header>
    <!-- Main Content Area -->
    <main
      class="relative z-10 flex-1 flex flex-col items-center justify-center w-full max-w-md mx-auto px-6 py-4"
    >
      <!-- Compass Unit -->
      <div class="compass-container w-72 h-72 mb-10 relative">
        <!-- Pulsing Rings -->
        <div class="absolute inset-0 flex items-center justify-center -z-10">
          <div class="w-full h-full rounded-full border border-primary/10"></div>
          <div class="pulse-ring"></div>
          <div class="pulse-ring"></div>
          <div class="pulse-ring"></div>
        </div>
        <!-- Central Glass Dial -->
        <div
          class="w-64 h-64 rounded-full glass-panel relative flex flex-col items-center justify-center shadow-2xl shadow-black/50 border border-white/10 ring-1 ring-black/40"
        >
          <!-- Cardinal Points -->
          <div class="absolute top-4 text-xs font-bold text-white/40">N</div>
          <div class="absolute bottom-4 text-xs font-bold text-white/40">S</div>
          <div class="absolute left-4 text-xs font-bold text-white/40">W</div>
          <div class="absolute right-4 text-xs font-bold text-white/40">E</div>
          <!-- Tick Marks -->
          <div
            class="absolute inset-2 rounded-full border border-dashed border-white/10 opacity-50"
          ></div>
          <!-- Directional Arrow -->
          <div class="absolute inset-0 flex items-center justify-center">
            <div
              class="w-0.5 h-24 bg-gradient-to-t from-transparent via-primary to-primary rounded-full origin-bottom -translate-y-12 rotate-[35deg] shadow-[0_0_15px_rgba(255,56,46,0.8)]"
            ></div>
          </div>
          <!-- Central Data -->
          <div class="relative z-20 flex flex-col items-center justify-center">
            <span
              class="text-7xl font-black text-white tracking-tighter leading-none drop-shadow-xl tabular-nums"
              >125</span
            >
            <span class="text-sm font-bold text-primary tracking-[0.2em] mt-2 uppercase"
              >Meters</span
            >
          </div>
        </div>
      </div>
      <!-- Guidance Text -->
      <div class="text-center space-y-2 mb-8 animate-pulse">
        <div
          class="inline-flex items-center gap-2 bg-primary/20 text-primary px-4 py-1.5 rounded-full border border-primary/20 backdrop-blur-sm"
        >
          <span class="material-symbols-outlined text-sm">arrow_upward</span>
          <span class="text-sm font-bold uppercase tracking-wide">Walk Forward</span>
        </div>
      </div>
      <!-- Map Snippet Card -->
      <div
        class="w-full bg-surface-dark border border-white/5 rounded-2xl p-3 flex gap-4 items-center mb-6 shadow-lg"
      >
        <div class="h-16 w-16 rounded-xl overflow-hidden bg-zinc-800 shrink-0 relative">
          <!-- Placeholder for map -->
          <div
            class="absolute inset-0 bg-cover bg-center opacity-60"
            data-alt="Abstract map view showing dark streets"
            data-location="Los Angeles"
            style="
              background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBy99fXSYLt78vhyUqBjTqVmSVGeYCWcI_KXhlisOe1A2a-yTfeoew2_nxIZ0x5EBQ1B0Vrz2QPafco1BPMRtVy8YTkxYruAQUA98e1ZOijGeNaNSkd314UvPd-a95MORXjO-LqNB0BQtiku1kAK_ZM1Fiw5Kal_P7KAWUYuEo9ZAS_S1CtcRVk2HYH88JTuCaEnTomRZA9PsA0ZxFTi583aM3jCj0EeuyWQPUCVy8JgEgbG4lShrrTIK9XXKO45aTdIBQbdWIUVu4q');
            "
          ></div>
          <div class="absolute inset-0 bg-primary/20 mix-blend-overlay"></div>
          <div class="absolute inset-0 flex items-center justify-center">
            <span class="material-symbols-outlined text-white drop-shadow-md">location_on</span>
          </div>
        </div>
        <div class="flex-1 min-w-0">
          <h3 class="text-white font-medium truncate">Dodger Stadium Parking</h3>
          <p class="text-zinc-500 text-xs mt-0.5">Pinned 2h ago • Level B2</p>
        </div>
        <button
          class="h-10 w-10 flex items-center justify-center text-zinc-400 hover:text-white transition-colors"
        >
          <span class="material-symbols-outlined">edit</span>
        </button>
      </div>
    </main>
    <!-- Bottom Actions -->
    <footer class="relative z-10 p-6 pt-0">
      <div class="grid grid-cols-3 gap-3">
        <!-- Flashlight -->
        <button
          class="group flex flex-col items-center justify-center gap-2 bg-surface-dark hover:bg-zinc-800 border border-white/5 active:border-primary/50 py-4 rounded-xl transition-all duration-200"
        >
          <div
            class="h-10 w-10 rounded-full bg-zinc-800 group-hover:bg-zinc-700 group-active:bg-primary/20 flex items-center justify-center transition-colors"
          >
            <span class="material-symbols-outlined text-zinc-300 group-active:text-primary"
              >flashlight_on</span
            >
          </div>
          <span class="text-xs font-medium text-zinc-400 group-hover:text-zinc-300"
            >Flashlight</span
          >
        </button>
        <!-- Horn -->
        <button
          class="group flex flex-col items-center justify-center gap-2 bg-surface-dark hover:bg-zinc-800 border border-white/5 active:border-primary/50 py-4 rounded-xl transition-all duration-200"
        >
          <div
            class="h-10 w-10 rounded-full bg-zinc-800 group-hover:bg-zinc-700 group-active:bg-primary/20 flex items-center justify-center transition-colors"
          >
            <span class="material-symbols-outlined text-zinc-300 group-active:text-primary"
              >campaign</span
            >
          </div>
          <span class="text-xs font-medium text-zinc-400 group-hover:text-zinc-300">Honk</span>
        </button>
        <!-- Panic/Alert -->
        <button
          class="group flex flex-col items-center justify-center gap-2 bg-surface-dark hover:bg-zinc-800 border border-white/5 active:border-primary/50 py-4 rounded-xl transition-all duration-200"
        >
          <div
            class="h-10 w-10 rounded-full bg-zinc-800 group-hover:bg-zinc-700 group-active:bg-primary/20 flex items-center justify-center transition-colors"
          >
            <span class="material-symbols-outlined text-zinc-300 group-active:text-primary"
              >e911_emergency</span
            >
          </div>
          <span class="text-xs font-medium text-zinc-400 group-hover:text-zinc-300">Panic</span>
        </button>
      </div>
      <!-- Bottom Indicator -->
      <div class="w-full flex justify-center mt-6 opacity-30">
        <div class="w-1/3 h-1 bg-white rounded-full"></div>
      </div>
    </footer>
  </body>
</html>
