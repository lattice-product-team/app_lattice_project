<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Circuit Map &amp; Search</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#ff382e',
              'background-light': '#f8f5f5',
              'background-dark': '#0A0A0B', // Updated to requested hex
              'glass-dark': 'rgba(20, 20, 20, 0.6)',
              'glass-border': 'rgba(255, 255, 255, 0.1)',
            },
            fontFamily: {
              display: ['Lexend', 'sans-serif'],
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '0.5rem',
              xl: '0.75rem',
              '2xl': '1rem',
              full: '9999px',
            },
          },
        },
      };
    </script>
    <style>
      /* Custom scrollbar for horizontal scrolling */
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Map glow effect simulation */
      .track-glow {
        filter: drop-shadow(0 0 8px rgba(255, 56, 46, 0.5));
      }

      /* Glassmorphism utility */
      .glass-panel {
        background: rgba(20, 20, 20, 0.75);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white font-display overflow-hidden"
  >
    <div class="relative flex h-screen w-full flex-col overflow-hidden bg-[#0A0A0B]">
      <!-- Background Map Layer -->
      <!-- Simulating a dark mode map with high contrast -->
      <div class="absolute inset-0 z-0 opacity-80">
        <img
          alt="Dark map background texture"
          class="h-full w-full object-cover grayscale brightness-[0.4] contrast-[1.2]"
          data-alt="Dark stylized map background texture"
          data-location="Silverstone Circuit"
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuAmyS-LLGpeL6O9Fy2HWvTIxBQsGz3RIlglcoD-8Awni8Tgcc3jfUNBmM1UhvXIxyCOPX4ivY-bZiqRB-d5Ov8jH7GWvxL7J1QYSW-fYCBVjiKE_YQElwwlZ72dLEEai5OvuuDZBsEDLpNTzy8doAY5J5ns_ZTXqVQR6iflkDpQFRtntVn3GJ1f4aUNLHkWRlXsw8WAYquU_je7hjSf8lOvrVdmckKnks4ru_JTQmgl-xkB3G4scFcOjv4g4o5nqGJajcQR3cZ9bYGa"
        />
        <!-- Stylized Track Overlay (SVG) -->
        <div
          class="absolute inset-0 flex items-center justify-center p-4 opacity-100 mix-blend-screen pointer-events-none"
        >
          <svg
            class="w-full h-full max-w-lg track-glow opacity-80"
            style="transform: rotate(-15deg) scale(1.2)"
            viewbox="0 0 400 300"
          >
            <path
              d="M50,150 C50,100 100,50 150,50 L250,50 C300,50 350,100 350,150 C350,200 300,250 250,250 L150,250 C100,250 50,200 50,150 Z"
              fill="none"
              stroke="#333"
              stroke-width="12"
            ></path>
            <path
              d="M50,150 C50,100 100,50 150,50 L250,50 C300,50 350,100 350,150 C350,200 300,250 250,250 L150,250 C100,250 50,200 50,150 Z"
              fill="none"
              stroke="#ff382e"
              stroke-dasharray="10 10"
              stroke-width="3"
            ></path>
          </svg>
        </div>
        <!-- Map Markers -->
        <!-- User Location -->
        <div
          class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 mt-12 ml-12 z-0"
        >
          <div class="relative flex h-6 w-6">
            <span
              class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"
            ></span>
            <span
              class="relative inline-flex rounded-full h-6 w-6 bg-primary border-2 border-white"
            ></span>
          </div>
        </div>
        <!-- Grandstand A -->
        <div class="absolute top-[35%] left-[30%] z-0 flex flex-col items-center gap-1 group">
          <div
            class="bg-primary text-white text-[10px] font-bold px-2 py-0.5 rounded shadow-lg opacity-0 group-hover:opacity-100 transition-opacity"
          >
            Grandstand A
          </div>
          <span
            class="material-symbols-outlined text-primary drop-shadow-[0_0_8px_rgba(255,56,46,0.8)] text-3xl cursor-pointer"
          >
            location_on
          </span>
        </div>
        <!-- Paddock Club -->
        <div class="absolute top-[25%] right-[25%] z-0 flex flex-col items-center gap-1">
          <div
            class="bg-[#281b1b] border border-primary/30 text-white text-xs font-medium px-2 py-1 rounded-md shadow-lg flex items-center gap-1"
          >
            <span class="w-2 h-2 rounded-full bg-primary"></span>
            Paddock Club
          </div>
        </div>
      </div>
      <!-- Top Floating Controls -->
      <div class="relative z-10 flex flex-col gap-4 px-4 pt-12 pb-4 pointer-events-none">
        <!-- Search Bar + AR Toggle -->
        <div class="flex gap-3 pointer-events-auto">
          <label
            class="glass-panel flex h-12 flex-1 items-center gap-3 rounded-full px-4 shadow-lg transition-transform active:scale-[0.98]"
          >
            <span class="material-symbols-outlined text-gray-400">search</span>
            <input
              class="flex-1 bg-transparent text-white placeholder-gray-400 focus:outline-none text-sm font-medium border-none p-0 focus:ring-0"
              placeholder="Find grandstands, food..."
              type="text"
            />
            <button class="flex items-center justify-center text-gray-400 hover:text-white">
              <span class="material-symbols-outlined">mic</span>
            </button>
          </label>
          <button
            class="glass-panel flex h-12 w-12 items-center justify-center rounded-full text-white shadow-lg active:scale-95 transition-transform hover:bg-white/10"
          >
            <span class="material-symbols-outlined">view_in_ar</span>
          </button>
        </div>
        <!-- Filter Chips -->
        <div class="flex gap-3 overflow-x-auto hide-scrollbar pb-2 pointer-events-auto">
          <button
            class="glass-panel flex h-9 shrink-0 items-center gap-2 rounded-full px-4 text-sm font-medium text-white shadow-md hover:bg-white/10 active:scale-95 transition-all"
          >
            <span class="material-symbols-outlined text-[18px]">stadium</span>
            Grandstands
          </button>
          <button
            class="bg-primary flex h-9 shrink-0 items-center gap-2 rounded-full px-4 text-sm font-medium text-white shadow-[0_0_15px_rgba(255,56,46,0.5)] active:scale-95 transition-all"
          >
            <span class="material-symbols-outlined text-[18px]">restaurant</span>
            Food
          </button>
          <button
            class="glass-panel flex h-9 shrink-0 items-center gap-2 rounded-full px-4 text-sm font-medium text-white shadow-md hover:bg-white/10 active:scale-95 transition-all"
          >
            <span class="material-symbols-outlined text-[18px]">local_parking</span>
            Parking
          </button>
          <button
            class="glass-panel flex h-9 shrink-0 items-center gap-2 rounded-full px-4 text-sm font-medium text-white shadow-md hover:bg-white/10 active:scale-95 transition-all"
          >
            <span class="material-symbols-outlined text-[18px]">shopping_bag</span>
            Merch
          </button>
          <button
            class="glass-panel flex h-9 shrink-0 items-center gap-2 rounded-full px-4 text-sm font-medium text-white shadow-md hover:bg-white/10 active:scale-95 transition-all"
          >
            <span class="material-symbols-outlined text-[18px]">wc</span>
            Toilets
          </button>
        </div>
      </div>
      <!-- Spacer to push content to bottom -->
      <div class="flex-1"></div>
      <!-- Floating Map Controls (Right Side) -->
      <div class="absolute right-4 bottom-32 z-10 flex flex-col gap-3">
        <button
          class="glass-panel flex h-10 w-10 items-center justify-center rounded-full text-white shadow-lg active:scale-95 transition-transform hover:bg-white/10"
        >
          <span class="material-symbols-outlined text-[20px]">layers</span>
        </button>
        <button
          class="glass-panel flex h-10 w-10 items-center justify-center rounded-full text-white shadow-lg active:scale-95 transition-transform hover:bg-white/10"
        >
          <span class="material-symbols-outlined text-[20px]">my_location</span>
        </button>
      </div>
      <!-- Bottom Sheet / Selected Location Card -->
      <div class="relative z-20 mx-4 mb-4">
        <div
          class="glass-panel rounded-2xl p-4 shadow-2xl backdrop-blur-xl border-t border-white/10"
        >
          <div class="flex items-start justify-between">
            <div>
              <div class="flex items-center gap-2 mb-1">
                <span
                  class="bg-primary/20 text-primary text-[10px] font-bold px-1.5 py-0.5 rounded uppercase tracking-wide"
                  >Food Court</span
                >
                <span class="text-green-400 text-[10px] font-medium flex items-center gap-1">
                  <span class="w-1.5 h-1.5 rounded-full bg-green-400"></span> Open Now
                </span>
              </div>
              <h2 class="text-lg font-bold text-white mb-0.5">Paddock Club Grill</h2>
              <p class="text-gray-400 text-xs flex items-center gap-1">
                <span class="material-symbols-outlined text-[14px]">timer</span> 5 min walk (350m)
              </p>
            </div>
            <button
              class="h-8 w-8 rounded-full bg-[#281b1b] flex items-center justify-center text-gray-400 hover:text-white"
            >
              <span class="material-symbols-outlined text-[20px]">close</span>
            </button>
          </div>
          <div class="mt-4 flex gap-3 overflow-x-auto hide-scrollbar">
            <img
              alt="Delicious burger at food court"
              class="h-20 w-28 rounded-lg object-cover flex-shrink-0 border border-white/5"
              data-alt="Grilled food item close up"
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuABaFHoJFgGNSmDHPQnntvyDtR9qM6UJKEFUopUuWYJ6EkR1mfuw6-fZjnm5VxW-DXYlj8vA6qP5CpX_FpznCNPwBS2FzVu2BjP-BByuge8rECbykbElwmNJbpaOsLn1BlN8zxL-_Qm2pD4KItZ8OoYqSDWkydDe58b4ISkfJzaIJK365I3w8DBARdxgxTVROQ06eR52Fa9pcYcNSfjxTI2BUHbKWQpPwvW4npXFN2PxjQgJRr523JtE1HJ9aXs6u9jajvjZq1fFIfr"
            />
            <img
              alt="Refreshing drinks"
              class="h-20 w-28 rounded-lg object-cover flex-shrink-0 border border-white/5"
              data-alt="Cold beverages in glasses"
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuAQNAsUu4vBvu6s3dIGiOmlcFfEQQ9q5n_pxgwikXMRJShSZp8n5r3XjYu5hBZSCbMSJVfXPcpb4vmArEYBAp4oR8wy_d-2d7MvQgng3tPCM24O82QgnzYDcwB_70jzg2d2hu65zoUcPromdegp9dD_OQPHNiJK49r_kFPsOihOoPsOW1_MI9Qheh2pBk_dC0nGzl0KIzI3Qb9iQJN33GQ23O0OkI_daNpSNdrgHcUfLdJmzkCpXEMeBg4WnGvN6yDjRecS6ZcQJdmU"
            />
            <div
              class="h-20 w-20 rounded-lg bg-[#281b1b] flex-shrink-0 flex items-center justify-center border border-white/5"
            >
              <span class="text-xs text-gray-400 font-medium">+4 more</span>
            </div>
          </div>
          <div class="mt-4 flex gap-3">
            <button
              class="flex-1 bg-primary hover:bg-red-600 text-white h-11 rounded-lg font-medium text-sm flex items-center justify-center gap-2 shadow-[0_4px_12px_rgba(255,56,46,0.3)] transition-colors"
            >
              <span class="material-symbols-outlined">navigation</span>
              Navigate Here
            </button>
            <button
              class="bg-[#281b1b] border border-white/10 hover:bg-[#3a2827] text-white h-11 w-11 rounded-lg flex items-center justify-center transition-colors"
            >
              <span class="material-symbols-outlined">share</span>
            </button>
          </div>
        </div>
      </div>
      <!-- Bottom Navigation Bar -->
      <div class="z-30 border-t border-white/5 bg-[#0F0F10] px-4 pb-6 pt-2">
        <div class="flex justify-between items-center">
          <a
            class="flex flex-1 flex-col items-center justify-end gap-1 text-gray-500 hover:text-primary transition-colors"
            href="#"
          >
            <span class="material-symbols-outlined text-2xl">home</span>
            <p class="text-[10px] font-medium">Home</p>
          </a>
          <a
            class="flex flex-1 flex-col items-center justify-end gap-1 text-gray-500 hover:text-primary transition-colors"
            href="#"
          >
            <span class="material-symbols-outlined text-2xl">calendar_today</span>
            <p class="text-[10px] font-medium">Schedule</p>
          </a>
          <a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary" href="#">
            <span class="material-symbols-outlined text-2xl fill-current">map</span>
            <p class="text-[10px] font-medium">Map</p>
          </a>
          <a
            class="flex flex-1 flex-col items-center justify-end gap-1 text-gray-500 hover:text-primary transition-colors"
            href="#"
          >
            <span class="material-symbols-outlined text-2xl">person</span>
            <p class="text-[10px] font-medium">Profile</p>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
