services:
  gateway:
    container_name: lattice_gateway
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/app_lattice_project/gateway:latest
    restart: always
    environment:
      - NODE_ENV=production
      - GATEWAY_PORT=3000
      - BASE_PATH=${BASE_PATH:-/}
      - AUTH_HOST=auth
      - AUTH_PORT=3001
      - GEO_HOST=geo
      - GEO_PORT=3002
      - SOCIAL_HOST=social
      - SOCIAL_PORT=3003
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    depends_on:
      - auth
      - geo
      - social
    networks:
      - red_proxy

  auth:
    container_name: lattice_auth
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/app_lattice_project/auth:latest
    restart: always
    environment:
      - NODE_ENV=production
      - AUTH_PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - red_proxy

  geo:
    container_name: lattice_geo
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/app_lattice_project/geo:latest
    restart: always
    environment:
      - NODE_ENV=production
      - GEO_PORT=3002
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - red_proxy

  social:
    container_name: lattice_social
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/app_lattice_project/social:latest
    restart: always
    environment:
      - NODE_ENV=production
      - SOCIAL_PORT=3003
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - red_proxy

  admin-web:
    container_name: lattice_admin_web
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/app_lattice_project/admin-web:latest
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3004
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - gateway
    networks:
      - red_proxy

networks:
  red_proxy:
    external: true
