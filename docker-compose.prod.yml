services:
  lattice_gateway:
    container_name: lattice_gateway
    build:
      context: .
      dockerfile: Dockerfile
      target: gateway-prod
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BASE_PATH=/lattice
      - AUTH_SERVICE_URL=http://lattice_auth:3001
      - GEO_SERVICE_URL=http://lattice_geo:3002
      - SOCIAL_SERVICE_URL=http://lattice_social:3003
    depends_on:
      - lattice_auth
      - lattice_geo
      - lattice_social
    networks:
      - red_proxy

  lattice_auth:
    container_name: lattice_auth
    build:
      context: .
      dockerfile: Dockerfile
      target: auth-prod
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - red_proxy

  lattice_geo:
    container_name: lattice_geo
    build:
      context: .
      dockerfile: Dockerfile
      target: geo-prod
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - red_proxy

  lattice_social:
    container_name: lattice_social
    build:
      context: .
      dockerfile: Dockerfile
      target: social-prod
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3003
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - red_proxy

  lattice_redis:
    container_name: lattice_redis
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - red_proxy

networks:
  red_proxy:
    external: true

volumes:
  redis_data:
