services:
  api:
    container_name: lattice_api
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/app_lattice_project/api:latest
    restart: always
    environment:
      - NODE_ENV=production
      - API_PORT=3000
      - API_BASE_PATH=${BASE_PATH:-/}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - REDIS_URL=redis://redis:6379
    networks:
      - red_proxy
    depends_on:
      - redis

  redis:
    container_name: lattice_redis
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - red_proxy

  admin-web:
    container_name: lattice_admin_web
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/app_lattice_project/admin-web:latest
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3004
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - api
    networks:
      - red_proxy

networks:
  red_proxy:
    external: true

volumes:
  redis_data:
