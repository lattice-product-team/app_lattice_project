services:
  db:
    image: postgis/postgis:15-3.3
    platform: linux/amd64
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_NAME:-lattice_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-lattice_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: gateway-dev
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    volumes:
      - .:/app:z
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - GATEWAY_PORT=3000
      - AUTH_HOST=auth
      - AUTH_PORT=3001
      - GEO_HOST=geo
      - GEO_PORT=3002
      - SOCIAL_HOST=social
      - SOCIAL_PORT=3003
      - VALHALLA_HOST=valhalla
      - VALHALLA_PORT=8002
    depends_on:
      - auth
      - geo
      - social

  auth:
    build:
      context: .
      dockerfile: Dockerfile
      target: auth-dev
    ports:
      - "${AUTH_PORT:-3001}:3001"
    volumes:
      - .:/app:z
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - AUTH_PORT=3001
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-lattice_db}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy

  geo:
    build:
      context: .
      dockerfile: Dockerfile
      target: geo-dev
    ports:
      - "${GEO_PORT:-3002}:3002"
    volumes:
      - .:/app:z
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - GEO_PORT=3002
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-lattice_db}
    depends_on:
      db:
        condition: service_healthy

  social:
    build:
      context: .
      dockerfile: Dockerfile
      target: social-dev
    ports:
      - "${SOCIAL_PORT:-3003}:3003"
    volumes:
      - .:/app:z
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - SOCIAL_PORT=3003
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-lattice_db}
    depends_on:
      db:
        condition: service_healthy

  admin-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: admin-web-dev
    ports:
      - "${ADMIN_WEB_PORT:-3004}:${ADMIN_WEB_PORT:-3004}"
    volumes:
      - .:/app:z
      - /app/node_modules
      - /app/apps/admin-web/.next
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3004
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=http://localhost:${GATEWAY_PORT:-3000}/api/v1
    depends_on:
      - gateway

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: "no"

  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla:latest
    ports:
      - "${VALHALLA_PORT:-8002}:8002"
    volumes:
      - valhalla_data:/custom_files
    environment:
      # Descargamos Cataluña para cubrir Barcelona y alrededores
      - tile_urls=https://download.geofabrik.de/europe/spain/catalonia-latest.osm.pbf
      - build_tiles=True
      - build_admins=True
      - build_timezones=True
      - force_rebuild=False
    restart: always

volumes:
  postgres_data:
  redis_data:
  valhalla_data:
