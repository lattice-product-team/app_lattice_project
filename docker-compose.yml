services:
  db:
    image: postgis/postgis:15-3.3
    platform: linux/amd64
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_NAME:-lattice_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-lattice_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: gateway-dev
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    volumes:
      - .:/app:z
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - GATEWAY_PORT=3000
      - AUTH_HOST=auth
      - AUTH_PORT=3001
      - GEO_HOST=geo
      - GEO_PORT=3002
      - SOCIAL_HOST=social
      - SOCIAL_PORT=3003
    depends_on:
      - auth
      - geo
      - social

  auth:
    build:
      context: .
      dockerfile: Dockerfile
      target: auth-dev
    ports:
      - "${AUTH_PORT:-3001}:3001"
    volumes:
      - .:/app:z
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - AUTH_PORT=3001
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-lattice_db}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy

  geo:
    build:
      context: .
      dockerfile: Dockerfile
      target: geo-dev
    ports:
      - "${GEO_PORT:-3002}:3002"
    volumes:
      - .:/app:z
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - GEO_PORT=3002
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-lattice_db}
    depends_on:
      db:
        condition: service_healthy

  social:
    build:
      context: .
      dockerfile: Dockerfile
      target: social-dev
    ports:
      - "${SOCIAL_PORT:-3003}:3003"
    volumes:
      - .:/app:z
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - SOCIAL_PORT=3003
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-lattice_db}
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: "no"

volumes:
  postgres_data:
  redis_data:
