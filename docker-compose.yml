services:
  db:
    image: postgis/postgis:15-3.3
    platform: linux/amd64
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_NAME:-lattice_db}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-lattice_db}']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-dev
    ports:
      - '${API_PORT:-3000}:3000'
    volumes:
      - .:/app:z
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - API_PORT=3000
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-lattice_db}
      - JWT_SECRET=${JWT_SECRET}
      - VALHALLA_HOST=valhalla
      - VALHALLA_PORT=8002
    depends_on:
      db:
        condition: service_healthy

  admin-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: admin-web-dev
    ports:
      - '${ADMIN_WEB_PORT:-3004}:${ADMIN_WEB_PORT:-3004}'
    volumes:
      - .:/app:z
      - /app/node_modules
      - /app/apps/admin-web/.next
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3004
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=http://localhost:${API_PORT:-3000}/v1
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    restart: 'no'

  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    ports:
      - '${VALHALLA_PORT:-8002}:8002'
    volumes:
      - ./.docker/valhalla:/custom_files
    environment:
      # Usamos el archivo local cataluna-260507.osm.pbf que ya está en .docker/valhalla
      - build_tiles=True
      - build_admins=True
      - build_timezones=True
      - force_rebuild=False
    restart: always

volumes:
  postgres_data:
  redis_data:
  valhalla_data:
