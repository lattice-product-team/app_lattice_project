name: Production Backend Deploy (GHCR)

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Images to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push API (Monolith)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: api-prod
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Admin Web
        uses: docker/build-push-action@v5
        with:
          context: .
          target: admin-web-prod
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/admin-web:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://projects.kore29.com/lattice/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Proxmox
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Setup Environment
        run: |
          echo "${{ secrets.DOTENV_PRODUCTION }}" > .env

      - name: Database Migrations
        run: |
          pnpm install --no-frozen-lockfile
          export DATABASE_URL=${{ secrets.DATABASE_URL }}
          pnpm db:migrate
          pnpm db:check

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and Restart Containers
        run: |
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d --remove-orphans
          docker system prune -f
