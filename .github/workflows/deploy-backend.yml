name: Pipeline - Deploy Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-check:
    name: Verify Build Integrity
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Build (Dry Run)
        run: pnpm build

  deploy:
    name: Build & Deploy Production
    needs: build-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Linux, X64]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}" >> .env
          echo "GATEWAY_BASE_PATH=/lattice/api" >> .env
          echo "NEXT_PUBLIC_API_URL=https://projects.kore29.com/lattice/api/v1" >> .env
          echo "NODE_ENV=production" >> .env
          echo "DB_SSL=false" >> .env
          cp .env apps/admin-web/.env

      - name: Build and Deploy Production
        run: |
          pnpm install --no-frozen-lockfile
          # Run migrations on the host before containers restart
          export DATABASE_URL=${{ secrets.DATABASE_URL }}
          pnpm db:migrate
          pnpm db:check
          
          docker compose -f docker-compose.prod.yml down --remove-orphans
          docker compose -f docker-compose.prod.yml up -d --build

      - name: Cleanup Unused Docker Resources
        run: docker system prune -f
